<!-- @dsCard group="Artist Website" viewport="1440x900" name="Home Page" subtitle="Randomized scroll mosaic + Painting/Sculpture galleries + lightbox" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosario Levine</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--color-bg, #0C0B09);
    color: var(--color-text-1, #EDE8E0);
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    -webkit-font-smoothing: antialiased;
  }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; background: none; border: none; padding: 0; font: inherit; color: inherit; }
  img { display: block; }

  /* ── Floating nav ─────────────────────────────────────────── */
  .scrim {
    position: fixed; top: 0; left: 0; right: 0; height: 150px;
    background: linear-gradient(to bottom, rgba(8,7,6,0.62) 0%, rgba(8,7,6,0.26) 45%, transparent 100%);
    pointer-events: none; z-index: 90;
  }
  body:not([data-view="home"]) .scrim { opacity: 0; }
  .nav {
    position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height, 64px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 clamp(18px, 3vw, 56px); z-index: 100;
    background: transparent; border-bottom: 1px solid transparent;
    transition: background 320ms ease, border-color 320ms ease;
  }
  body:not([data-view="home"]) .nav {
    background: var(--color-bg, #0C0B09);
    border-bottom-color: var(--color-border-subtle, #181612);
  }
  .wordmark {
    font-family: var(--font-display, 'Cormorant', Georgia, serif);
    font-size: clamp(17px, 1.7vw, 24px); font-weight: 400;
    letter-spacing: 0.06em; color: var(--color-text-1, #EDE8E0);
    text-shadow: 0 1px 14px rgba(0,0,0,0.45); white-space: nowrap;
  }
  .nav-links { display: flex; align-items: center; gap: clamp(16px, 2.4vw, 38px); flex-shrink: 0; }
  .nav-links a {
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; white-space: nowrap;
    color: rgba(237,232,224,0.72); padding-bottom: 2px;
    border-bottom: 1px solid transparent;
    text-shadow: 0 1px 12px rgba(0,0,0,0.5);
    transition: color 200ms ease, border-color 200ms ease;
  }
  .nav-links a:hover { color: #fff; }
  .nav-links a.active { color: #fff; border-bottom-color: rgba(255,255,255,0.7); }
  .ig { display: inline-flex; align-items: center; color: rgba(237,232,224,0.72); transition: color 200ms ease; }
  .ig:hover { color: #fff; }
  .ig svg { display: block; filter: drop-shadow(0 1px 8px rgba(0,0,0,0.5)); }

  /* ── Home: scroll mosaic ──────────────────────────────────── */
  .panel {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 2px; height: 100vh;
    background: var(--color-bg, #0C0B09);
  }
  .tile, .gcard {
    position: relative; overflow: hidden; cursor: pointer;
    background: var(--color-surface, #161412);
  }
  .tile img, .gcard img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 760ms var(--ease-gallery, cubic-bezier(0.25,0.46,0.45,0.94));
  }
  .tile:hover img, .gcard:hover img { transform: scale(1.045); }
  figcaption {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: clamp(16px, 1.8vw, 28px);
    background: linear-gradient(to top, rgba(8,7,6,0.80) 0%, rgba(8,7,6,0.10) 42%, transparent 70%);
    opacity: 0; transition: opacity 420ms var(--ease-out, ease);
  }
  .tile:hover figcaption, .gcard:hover figcaption { opacity: 1; }
  .cap-cat {
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(237,232,224,0.6); margin-bottom: 7px; display: block;
  }
  .cap-title {
    font-family: var(--font-display, 'Cormorant', Georgia, serif);
    font-size: clamp(20px, 2.2vw, 32px); font-weight: 300; font-style: italic;
    color: #fff; line-height: 1.05; margin-bottom: 3px;
  }
  .cap-medium { font-family: var(--font-ui, 'DM Sans', sans-serif); font-size: 11px; letter-spacing: 0.05em; color: rgba(237,232,224,0.7); }

  /* ── Scroll button ────────────────────────────────────────── */
  .scroll-btn {
    position: fixed; left: 50%; bottom: clamp(20px, 3.5vh, 40px); transform: translateX(-50%);
    z-index: 95; display: flex; flex-direction: column; align-items: center; gap: 9px;
    color: rgba(237,232,224,0.85);
  }
  body:not([data-view="home"]) .scroll-btn { display: none; }
  .sb-label {
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 9px; letter-spacing: 0.26em; text-transform: uppercase;
    text-shadow: 0 1px 10px rgba(0,0,0,0.6);
  }
  .sb-circle {
    width: 42px; height: 42px; border-radius: 999px;
    border: 1px solid rgba(237,232,224,0.5);
    background: rgba(12,11,9,0.35); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: bob 2.4s ease-in-out infinite;
    transition: background 200ms ease, border-color 200ms ease;
  }
  .scroll-btn:hover .sb-circle { background: rgba(12,11,9,0.7); border-color: rgba(237,232,224,0.85); }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(4px); } }

  /* ── Gallery view ─────────────────────────────────────────── */
  .view-gallery { padding-top: var(--nav-height, 64px); min-height: 100vh; }
  .gallery-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: clamp(28px, 5vh, 56px) clamp(18px, 3vw, 56px) clamp(18px, 2.5vh, 28px);
  }
  .gallery-head h1 {
    font-family: var(--font-display, 'Cormorant', Georgia, serif);
    font-size: clamp(34px, 5vw, 60px); font-weight: 300; font-style: italic;
    color: var(--color-text-1, #EDE8E0); line-height: 1;
  }
  .gallery-head .count {
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--color-text-3, #5A5550);
  }
  .grid {
    display: grid; gap: 3px; padding: 0 3px 3px;
    grid-template-columns: repeat(2, 1fr);
  }
  @media (min-width: 720px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }
  .gcard { aspect-ratio: 1 / 1; }

  /* ── About view ───────────────────────────────────────────── */
  .view-about { padding-top: var(--nav-height, 64px); min-height: 100vh; }
  .about-wrap { display: grid; grid-template-columns: 0.92fr 1.08fr; min-height: calc(100vh - var(--nav-height, 64px)); }
  .about-img { overflow: hidden; background: var(--color-surface, #161412); }
  .about-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .about-text {
    display: flex; flex-direction: column; justify-content: center; gap: 26px;
    padding: clamp(40px, 6vw, 104px);
  }
  .about-text h1 {
    font-family: var(--font-display, 'Cormorant', Georgia, serif);
    font-size: clamp(38px, 4.6vw, 64px); font-weight: 300; font-style: italic;
    line-height: 1; color: var(--color-text-1, #EDE8E0);
  }
  .about-lead {
    font-family: var(--font-display, 'Cormorant', Georgia, serif);
    font-size: clamp(21px, 2.1vw, 29px); font-weight: 300; font-style: italic;
    line-height: 1.32; color: var(--color-text-1, #EDE8E0); max-width: 18em;
  }
  .about-body {
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 15px; line-height: 1.85; color: var(--color-text-2, #8A847C); max-width: 34em;
  }
  .about-body p + p { margin-top: 16px; }
  .about-meta { display: flex; align-items: center; gap: 22px; margin-top: 8px; flex-wrap: wrap; }
  .about-sig {
    font-family: var(--font-display, 'Cormorant', Georgia, serif);
    font-style: italic; font-size: 21px; font-weight: 400; color: var(--color-text-1, #EDE8E0);
  }
  .about-ig {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--color-text-2, #8A847C);
    border-bottom: 1px solid var(--color-border, #332E2A); padding-bottom: 3px;
    transition: color 200ms ease, border-color 200ms ease;
  }
  .about-ig:hover { color: var(--color-text-1, #EDE8E0); border-bottom-color: var(--color-text-2, #8A847C); }
  @media (max-width: 820px) {
    .about-wrap { grid-template-columns: 1fr; }
    .about-img { height: 56vh; }
  }

  /* ── Contact view ─────────────────────────────────────────── */
  .view-contact { padding-top: var(--nav-height, 64px); min-height: 100vh; }
  .contact-wrap {
    display: grid; grid-template-columns: 1fr 1fr; gap: clamp(40px, 6vw, 96px);
    max-width: 1080px; margin: 0 auto; align-items: center;
    min-height: calc(100vh - var(--nav-height, 64px));
    padding: clamp(44px, 7vh, 100px) clamp(18px, 3vw, 56px);
  }
  .contact-intro h1 {
    font-family: var(--font-display, 'Cormorant', Georgia, serif);
    font-size: clamp(38px, 4.6vw, 64px); font-weight: 300; font-style: italic;
    line-height: 1; color: var(--color-text-1, #EDE8E0);
  }
  .contact-lead {
    font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 15px; line-height: 1.8; color: var(--color-text-2, #8A847C);
    max-width: 30em; margin-top: 20px;
  }
  .contact-details { margin-top: 36px; display: flex; flex-direction: column; gap: 16px; }
  .cd-label { font-family: var(--font-ui, 'DM Sans', sans-serif); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-text-3, #5A5550); margin-bottom: 4px; }
  .cd-value, .cd-value a { font-family: var(--font-ui, 'DM Sans', sans-serif); font-size: 14px; color: var(--color-text-1, #EDE8E0); letter-spacing: 0.02em; }
  .cd-value a { border-bottom: 1px solid var(--color-border, #332E2A); padding-bottom: 2px; transition: color 200ms ease, border-color 200ms ease; }
  .cd-value a:hover { color: var(--color-text-2, #8A847C); border-bottom-color: var(--color-text-2, #8A847C); }
  .contact-form { display: flex; flex-direction: column; gap: 26px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-family: var(--font-ui, 'DM Sans', sans-serif); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-text-3, #5A5550); }
  .field input, .field textarea {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid var(--color-border, #332E2A);
    padding: 10px 0; font-family: var(--font-ui, 'DM Sans', sans-serif);
    font-size: 14px; color: var(--color-text-1, #EDE8E0); transition: border-color 200ms ease;
  }
  .field input:focus, .field textarea:focus { border-bottom-color: var(--color-text-1, #EDE8E0); }
  .field textarea { resize: vertical; min-height: 88px; }
  .contact-send {
    align-self: flex-start; padding: 13px 34px;
    font-family: var(--font-ui, 'DM Sans', sans-serif); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    background: var(--color-text-1, #EDE8E0); color: var(--color-bg, #0C0B09);
    border: 1px solid var(--color-text-1, #EDE8E0); transition: opacity 200ms ease;
  }
  .contact-send:hover { opacity: 0.85; }
  .contact-send:disabled { opacity: 0.5; cursor: default; }
  .contact-note { font-family: var(--font-ui, 'DM Sans', sans-serif); font-size: 11px; color: var(--color-accent, #C4A073); min-height: 14px; }
  .contact-success { display: flex; flex-direction: column; gap: 14px; }
  .cs-title { font-family: var(--font-display, 'Cormorant', Georgia, serif); font-size: clamp(28px, 3vw, 42px); font-weight: 300; font-style: italic; color: var(--color-text-1, #EDE8E0); }
  .contact-success p { font-family: var(--font-ui, 'DM Sans', sans-serif); font-size: 14px; line-height: 1.8; color: var(--color-text-2, #8A847C); max-width: 32em; }
  @media (max-width: 820px) { .contact-wrap { grid-template-columns: 1fr; gap: 44px; } }

  /* ── Lightbox ─────────────────────────────────────────────── */
  .lightbox { position: fixed; inset: 0; z-index: 200; background: var(--color-bg, #0C0B09); display: none; flex-direction: column; }
  .lightbox.open { display: flex; }
  .lb-top { display: flex; justify-content: space-between; align-items: center; height: var(--nav-height, 64px); padding: 0 clamp(18px, 3vw, 56px); border-bottom: 1px solid var(--color-border-subtle, #181612); flex-shrink: 0; }
  .lb-title { font-family: var(--font-display, serif); font-size: 20px; font-style: italic; font-weight: 300; color: var(--color-text-1, #EDE8E0); }
  .lb-right { display: flex; align-items: center; gap: 24px; }
  .lb-count { font-family: var(--font-ui, sans-serif); font-size: 10px; color: var(--color-text-3, #5A5550); letter-spacing: 0.08em; }
  .lb-close { font-family: var(--font-ui, sans-serif); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-text-2, #8A847C); }
  .lb-close:hover { color: var(--color-text-1, #EDE8E0); }
  .lb-stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 36px; overflow: hidden; }
  .lb-stage img { max-width: 88vw; max-height: calc(100vh - 160px); object-fit: contain; }
  .lb-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 22px; color: var(--color-text-3, #5A5550); padding: 14px; transition: color 160ms ease; }
  .lb-arrow:hover { color: var(--color-text-1, #EDE8E0); }
  .lb-prev { left: clamp(8px, 3vw, 40px); } .lb-next { right: clamp(8px, 3vw, 40px); }
  .lb-bottom { padding: 16px clamp(18px, 3vw, 56px); border-top: 1px solid var(--color-border-subtle, #181612); flex-shrink: 0; }
  .lb-meta { font-family: var(--font-ui, sans-serif); font-size: 11px; color: var(--color-text-2, #8A847C); letter-spacing: 0.05em; }

  /* ── Responsive ───────────────────────────────────────────── */
  @media (max-width: 760px) {
    .panel { grid-template-columns: 1fr; grid-template-rows: repeat(auto-fill, minmax(48vh, 1fr)); height: auto; }
    .panel .tile { grid-column: 1 / -1 !important; grid-row: auto !important; min-height: 52vh; }
    figcaption { opacity: 1; }
    .nav-links { gap: 13px; }
  }
</style>
</head>
<body data-view="home">

<div class="scrim"></div>
<header class="nav">
  <a href="#" class="wordmark" data-nav="home">Rosario Levine</a>
  <nav class="nav-links">
    <a href="#" data-nav="painting">Painting</a>
    <a href="#" data-nav="sculpture">Sculpture</a>
    <a href="#" data-nav="about">About</a>
    <a href="#" data-nav="contact">Contact</a>
    <a class="ig" href="https://www.instagram.com/rosariolevine/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2.6" y="2.6" width="18.8" height="18.8" rx="5.3"/>
        <circle cx="12" cy="12" r="4.1"/>
        <circle cx="17.4" cy="6.6" r="1.15" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </nav>
</header>

<main id="app"></main>

<button class="scroll-btn" id="scrollBtn" aria-label="Scroll for more work">
  <span class="sb-label">Scroll</span>
  <span class="sb-circle">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 9l6 6 6-6"/></svg>
  </span>
</button>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <div class="lb-top">
    <span class="lb-title" id="lbTitle"></span>
    <div class="lb-right">
      <span class="lb-count" id="lbCount"></span>
      <button class="lb-close" id="lbClose">Close</button>
    </div>
  </div>
  <div class="lb-stage">
    <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Previous">←</button>
    <img id="lbImg" alt="">
    <button class="lb-arrow lb-next" id="lbNext" aria-label="Next">→</button>
  </div>
  <div class="lb-bottom"><span class="lb-meta" id="lbMeta"></span></div>
</div>

<script>
/* ─── Works (provisional titles — replace with real ones) ─── */
const A = '../../assets/artworks/';
const WORKS = [
  { id:'p-ibis',    title:'Scarlet Ibis',        medium:'Oil on canvas', category:'painting',  px:1950, src:A+'painting-flamingo.jpg' },
  { id:'p-brom',    title:'Bromeliad',           medium:'Oil on canvas', category:'painting',  px:361,  src:A+'painting-foliage.jpg' },
  { id:'p-mural',   title:'Reverie · Nine Panels',medium:'Oil on canvas',category:'painting',  px:1536, src:A+'painting-mural.jpg' },
  { id:'p-lily',    title:'Lily Pond',           medium:'Oil on canvas', category:'painting',  px:1800, src:A+'painting-lilypond.jpg' },
  { id:'p-vessel',  title:'Vessel',              medium:'Oil on canvas', category:'painting',  px:366,  src:A+'painting-vessel.jpg' },
  { id:'s-ripple',  title:'Ripple',              medium:'Stoneware',     category:'sculpture', px:1733, src:A+'ceramic-ripple.jpg' },
  { id:'s-cont',    title:'Continuity',          medium:'Stoneware',     category:'sculpture', px:1733, src:A+'ceramic-continuity.jpg' },
  { id:'s-anem',    title:'Anemone',             medium:'Glazed ceramic',category:'sculpture', px:1800, src:A+'sculpture-anemone.jpg' },
  { id:'s-bloom',   title:'Blooming',            medium:'Glazed stoneware',category:'sculpture',px:1600, src:A+'sculpture-blooming.jpg' },
  { id:'s-fig',     title:'Bouquet',             medium:'Glazed ceramic',category:'sculpture', px:248,  src:A+'sculpture-figure.jpg' },
];
const byId = Object.fromEntries(WORKS.map(w => [w.id, w]));

/* ─── Mosaic templates (12-col × 6-row grid cells) ─── */
const TEMPLATES = [
  [ {cs:1,ce:8,rs:1,re:4}, {cs:8,ce:13,rs:1,re:4}, {cs:1,ce:5,rs:4,re:7}, {cs:5,ce:13,rs:4,re:7} ],
  [ {cs:1,ce:5,rs:1,re:7}, {cs:5,ce:13,rs:1,re:4}, {cs:5,ce:13,rs:4,re:7} ],
  [ {cs:1,ce:9,rs:1,re:4}, {cs:9,ce:13,rs:1,re:4}, {cs:1,ce:13,rs:4,re:7} ],
];

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

const app = document.getElementById('app');
let currentList = [];

function figureHTML(w, styleAttr){
  return `<figure class="tile" data-id="${w.id}" style="${styleAttr}">
    <img src="${w.src}" alt="${w.title}" loading="lazy">
    <figcaption><div>
      <span class="cap-cat">${w.category}</span>
      <div class="cap-title">${w.title}</div>
      <div class="cap-medium">${w.medium}</div>
    </div></figcaption>
  </figure>`;
}

function renderHome(){
  const shuffled = shuffle(WORKS);
  let idx = 0, html = '';
  for (const tpl of TEMPLATES){
    const k = tpl.length;
    const works = shuffled.slice(idx, idx + k); idx += k;
    if (works.length === 0) break;
    // Pair lower-res works to smaller cells so nothing is blown up too large.
    const cells = tpl.slice(0, works.length).map((c,i)=>({ ...c, i, area:(c.ce-c.cs)*(c.re-c.rs) }));
    const cellsByArea = [...cells].sort((a,b)=> a.area-b.area);
    const worksByRes  = [...works].sort((a,b)=> a.px-b.px);
    const placed = new Array(works.length);
    cellsByArea.forEach((cell,j)=>{ placed[cell.i] = worksByRes[j]; });
    const tiles = cells.map((c,i)=> figureHTML(placed[i], `grid-column:${c.cs}/${c.ce};grid-row:${c.rs}/${c.re}`)).join('');
    html += `<section class="panel">${tiles}</section>`;
  }
  document.body.dataset.view = 'home';
  app.className = 'view-home';
  app.innerHTML = html;
  currentList = shuffled.slice(0, idx);
  setActiveNav('home');
  bindTiles();
  window.scrollTo(0, 0);
}

function renderGallery(cat){
  const works = WORKS.filter(w => w.category === cat);
  document.body.dataset.view = 'gallery';
  app.className = 'view-gallery';
  app.innerHTML =
    `<div class="gallery-head">
       <h1>${cat === 'painting' ? 'Painting' : 'Sculpture'}</h1>
       <span class="count">${works.length} ${works.length === 1 ? 'work' : 'works'}</span>
     </div>
     <div class="grid">${works.map(w => figureHTML(w, '').replace('class="tile"','class="gcard"')).join('')}</div>`;
  currentList = works;
  setActiveNav(cat);
  bindTiles();
  window.scrollTo(0, 0);
}

/* ─── About ─── */
const PORTRAIT = A + 'painting-lilypond.jpg';

  document.body.dataset.view = 'about';
  app.className = 'view-about';
  app.innerHTML =
    `<div class="about-wrap">
       <div class="about-img"><img src="${PORTRAIT}" alt="Painting by Rosario Levine"></div>
       <div class="about-text">
         <h1>About</h1>
         <p class="about-lead">Rosario’s flights of fancy celebrate the exuberance of life and the intoxicating sensuousness of nature.</p>
         <div class="about-body">
           <p>Illusion and reality intermingle happily in her diverse microcosms, but it is color, fluidity, and repetition that give her work its complex energy. While she attains a balanced cohesiveness within her rhythmic panoramas, it is the duality of the “bounded” yet “unbounded” forms that captures her imagination as she seeks possibilities of change and chance.</p>
           <p>Ultimately, she strives to make the world a little happier by transforming life’s confusing journey into brilliant displays of hope and interconnected joy.</p>
         </div>
         <div class="about-meta">
           <span class="about-sig">Rosario Levine</span>
           <a class="about-ig" href="https://www.instagram.com/rosariolevine/" target="_blank" rel="noopener noreferrer">
             <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.6" y="2.6" width="18.8" height="18.8" rx="5.3"/><circle cx="12" cy="12" r="4.1"/><circle cx="17.4" cy="6.6" r="1.15" fill="currentColor" stroke="none"/></svg>
             Instagram

/* ─── Contact ─── */
const CONTACT = { email: 'rosario@rosariolevine.com', phone: '305-240-3096' };
// To deliver mail without a backend, paste a form endpoint here
// (e.g. Formspree "https://formspree.io/f/xxxx" or Web3Forms). Empty = mailto fallback.
const FORM_ENDPOINT = '';

function renderContact(){
  document.body.dataset.view = 'contact';
  app.className = 'view-contact';
  app.innerHTML =
    `<div class="contact-wrap">
       <div class="contact-intro">
         <h1>Say hello</h1>
         <p class="contact-lead">For enquiries about available work, commissions, or exhibitions, send a note — or reach out directly.</p>
         <div class="contact-details">
           <div><div class="cd-label">Email</div><div class="cd-value"><a href="mailto:${CONTACT.email}">${CONTACT.email}</a></div></div>
           <div><div class="cd-label">Phone</div><div class="cd-value"><a href="tel:+1${CONTACT.phone.replace(/[^0-9]/g,'')}">${CONTACT.phone}</a></div></div>
           <div><div class="cd-label">Instagram</div><div class="cd-value"><a href="https://www.instagram.com/rosariolevine/" target="_blank" rel="noopener noreferrer">@rosariolevine</a></div></div>
         </div>
       </div>
       <div id="contactCol">
         <form id="contactForm" novalidate>
           <div class="contact-form">
             <div class="field"><label for="cf-name">Name</label><input id="cf-name" name="name" type="text" required></div>
             <div class="field"><label for="cf-email">Email</label><input id="cf-email" name="email" type="email" required></div>
             <div class="field"><label for="cf-msg">Message</label><textarea id="cf-msg" name="message" rows="4" required></textarea></div>
             <div class="contact-note" id="cfNote"></div>
             <button type="submit" class="contact-send">Send</button>
           </div>
         </form>
       </div>
     </div>`;
  currentList = [];
  setActiveNav('contact');
  window.scrollTo(0, 0);
  app.querySelector('#contactForm').addEventListener('submit', onContactSubmit);
}

function contactSuccess(viaMailto){
  document.getElementById('contactCol').innerHTML =
    `<div class="contact-success">
       <div class="cs-title">Thank you.</div>
       <p>${viaMailto
         ? 'Your message is ready in your email app — just press send and it\u2019s on its way.'
         : 'Your message has been sent. Rosario will be in touch soon.'}</p>
     </div>`;
}

async function onContactSubmit(e){
  e.preventDefault();
  const form = e.target;
  if (!form.name.value || !form.email.value || !form.message.value){
    document.getElementById('cfNote').textContent = 'Please complete every field.';
    return;
  }
  const data = { name: form.name.value, email: form.email.value, message: form.message.value };
  const btn = form.querySelector('.contact-send');
  if (FORM_ENDPOINT){
    btn.disabled = true; btn.textContent = 'Sending\u2026';
    try {
      const res = await fetch(FORM_ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify(data) });
      if (!res.ok) throw new Error('bad status');
      contactSuccess(false);
    } catch (err){
      btn.disabled = false; btn.textContent = 'Send';
      document.getElementById('cfNote').textContent = 'Something went wrong — please email directly.';
    }
  } else {
    const subject = encodeURIComponent('Website enquiry — ' + data.name);
    const body = encodeURIComponent(data.message + '\n\n— ' + data.name + ' (' + data.email + ')');
    window.location.href = 'mailto:' + CONTACT.email + '?subject=' + subject + '&body=' + body;
    contactSuccess(true);
  }
}

function setActiveNav(view){
  document.querySelectorAll('.nav-links a[data-nav]').forEach(a => {
    a.classList.toggle('active', a.dataset.nav === view);
  });
}

/* ─── Lightbox ─── */
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbTitle = document.getElementById('lbTitle');
const lbMeta = document.getElementById('lbMeta');
const lbCount = document.getElementById('lbCount');
let li = 0;

function lbRender(){
  const w = currentList[li];
  lbImg.src = w.src; lbImg.alt = w.title;
  lbTitle.textContent = w.title;
  lbMeta.textContent = w.medium + ' · ' + w.category.charAt(0).toUpperCase() + w.category.slice(1);
  lbCount.textContent = (li + 1) + ' / ' + currentList.length;
  document.getElementById('lbPrev').style.visibility = li > 0 ? 'visible' : 'hidden';
  document.getElementById('lbNext').style.visibility = li < currentList.length - 1 ? 'visible' : 'hidden';
}
function lbOpen(id){ li = currentList.findIndex(w => w.id === id); if (li < 0) li = 0; lbRender(); lb.classList.add('open'); lb.setAttribute('aria-hidden','false'); }
function lbClose(){ lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); }

function bindTiles(){
  app.querySelectorAll('[data-id]').forEach(el => el.addEventListener('click', () => lbOpen(el.dataset.id)));
}

document.getElementById('lbClose').addEventListener('click', lbClose);
document.getElementById('lbPrev').addEventListener('click', () => { if (li > 0){ li--; lbRender(); } });
document.getElementById('lbNext').addEventListener('click', () => { if (li < currentList.length - 1){ li++; lbRender(); } });
document.addEventListener('keydown', (e) => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') lbClose();
  if (e.key === 'ArrowLeft' && li > 0){ li--; lbRender(); }
  if (e.key === 'ArrowRight' && li < currentList.length - 1){ li++; lbRender(); }
});

/* ─── Nav routing ─── */
document.querySelectorAll('[data-nav]').forEach(a => {
  a.addEventListener('click', (e) => {
    e.preventDefault();
    const v = a.dataset.nav;
    if (v === 'painting' || v === 'sculpture') renderGallery(v);
    else if (v === 'about') renderAbout();
    else if (v === 'contact') renderContact();
    else renderHome();
  });
});

/* ─── Scroll button: advance to next panel, loop at end ─── */
document.getElementById('scrollBtn').addEventListener('click', () => {
  const panels = [...document.querySelectorAll('.panel')];
  const y = window.scrollY;
  const next = panels.find(p => p.offsetTop > y + 5);
  window.scrollTo({ top: next ? next.offsetTop : 0, behavior: 'smooth' });
});

renderHome();
</script>
