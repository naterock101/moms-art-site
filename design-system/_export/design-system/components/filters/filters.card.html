<!-- @dsCard group="Components" name="Filter System" viewport="700x120" subtitle="Primary tabs (All/Painting/Sculpture) and scrollable secondary tag pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { FilterBar, FilterChip } = window.RosarioLevineDesignSystem_be1c33;
const { useState } = React;

const TAGS = [
  { id:'abstract',    label:'Abstract'          },
  { id:'figurative',  label:'Figurative'        },
  { id:'color-study', label:'Color Study'       },
  { id:'form',        label:'Form'              },
  { id:'texture',     label:'Surface & Texture' },
  { id:'large-scale', label:'Large Scale'       },
  { id:'small-works', label:'Small Works'       },
];

function Demo() {
  const [primary, setPrimary] = useState('painting');
  const [active,  setActive]  = useState(['abstract', 'color-study']);
  const toggle = id => setActive(p => p.includes(id) ? p.filter(t=>t!==id) : [...p, id]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
      <FilterBar
        primaryFilter={primary}
        onPrimaryChange={setPrimary}
        secondaryFilters={TAGS}
        activeTags={active}
        onTagToggle={toggle}
      />
      <div style={{
        padding: '10px var(--page-gutter, 40px)',
        display: 'flex', gap: 8, flexWrap: 'wrap',
        borderBottom: '1px solid var(--color-border-subtle)',
      }}>
        {TAGS.map(t => (
          <FilterChip key={t.id} label={t.label} active={active.includes(t.id)} onClick={() => toggle(t.id)} />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
