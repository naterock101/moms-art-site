<!-- @dsCard group="Brand" name="Name Treatment" viewport="700x200" subtitle="Cormorant as the brand voice — roman and italic, two weights" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 20px 28px; display: flex; flex-direction: column; gap: 4px; }
  .rule { border: none; border-top: 1px solid var(--color-border-subtle); margin: 8px 0; }
  .caption { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-3); }
</style>
</head>
<body>
  <div style="font-family:var(--font-display); font-size:clamp(22px,4vw,36px); font-weight:400; letter-spacing:0.06em; color:var(--color-text-1);">Rosario Levine</div>
  <div class="caption">Header nav — 22px regular · tracking 0.06em</div>
  <hr class="rule">
  <div style="font-family:var(--font-display); font-size:60px; font-weight:300; font-style:italic; color:var(--color-text-1); line-height:1.0;">Rosario Levine</div>
  <div class="caption">Hero / landing — 60px light italic · tracking normal</div>
  <hr class="rule">
  <div style="font-family:var(--font-ui); font-size:9px; font-weight:400; letter-spacing:0.22em; text-transform:uppercase; color:var(--color-text-3);">ROSARIO LEVINE</div>
  <div class="caption">Footer / watermark — 9px DM Sans · tracking 0.22em</div>
</body>
</html>
